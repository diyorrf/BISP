services:
  db:
    image: postgres:16-alpine
    container_name: legalguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: LegalGuard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./back
    container_name: legalguard-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=LegalGuard;Username=postgres;Password=${POSTGRES_PASSWORD}"
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      JwtSettings__Issuer: LegalGuard
      JwtSettings__Audience: LegalGuardUsers
      JwtSettings__ExpirationMinutes: 60
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__ChatModel: ${OPENAI_CHAT_MODEL}
      OpenAI__EmbeddingModel: ${OPENAI_EMBEDDING_MODEL}
      EmailSettings__Host: ${EMAIL_HOST}
      EmailSettings__Port: ${EMAIL_PORT}
      EmailSettings__SenderEmail: ${EMAIL_SENDER}
      EmailSettings__SenderName: Legal Guard
      EmailSettings__Username: ${EMAIL_USERNAME}
      EmailSettings__Password: ${EMAIL_PASSWORD}
      AdminSettings__Email: ${ADMIN_EMAIL}
    volumes:
      - backend-storage:/app/Storage
    expose:
      - "5000"

  frontend:
    build: ./front
    container_name: legalguard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

  admin:
    build: ./admin
    container_name: legalguard-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4201:80"

volumes:
  pgdata:
  backend-storage:
