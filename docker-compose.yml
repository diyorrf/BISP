version: "3.9"

services:

  backend:
    build: ./back
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

  frontend:
    build: ./front
    container_name: frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
