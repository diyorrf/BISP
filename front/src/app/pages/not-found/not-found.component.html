<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
  <div class="mb-8">
    <h1 class="text-6xl font-semibold text-slate-900 mb-4">404</h1>
    <h2 class="text-2xl font-semibold text-slate-700 mb-2">Page Not Found</h2>
    <p class="text-slate-600">
      The page you're looking for doesn't exist or has been moved.
    </p>
  </div>

  <div class="flex gap-4">
    <a
      routerLink="/"
      class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors"
    >
      <lucide-icon [img]="icons.Home" [size]="20"></lucide-icon>
      Go to Dashboard
    </a>
    <button
      (click)="goBack()"
      class="flex items-center gap-2 px-6 py-3 border border-slate-300 text-slate-700 rounded-lg font-medium hover:bg-slate-50 transition-colors"
    >
      <lucide-icon [img]="icons.ArrowLeft" [size]="20"></lucide-icon>
      Go Back
    </button>
  </div>
</div>
