<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col flex-shrink-0">
    <div class="p-6 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
          <lucide-icon [img]="icons.Shield" [size]="22" class="text-white"></lucide-icon>
        </div>
        <div>
          <h1 class="font-bold text-lg leading-tight">LegalGuard</h1>
          <p class="text-xs text-slate-400">Admin Panel</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-slate-800 text-white"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors"
        >
          <lucide-icon [img]="item.icon" [size]="20"></lucide-icon>
          <span class="text-sm font-medium">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="p-4 border-t border-slate-700">
      <button
        (click)="logout()"
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors w-full"
      >
        <lucide-icon [img]="icons.LogOut" [size]="20"></lucide-icon>
        <span class="text-sm font-medium">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-8 overflow-auto">
    <router-outlet />
  </main>
</div>
