<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4">
        <lucide-icon [img]="icons.Shield" [size]="32" class="text-white"></lucide-icon>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">LegalGuard Admin</h1>
      <p class="text-slate-500 mt-1">Sign in to the admin panel</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
      @if (error()) {
        <div class="mb-6 bg-red-50 border border-red-200 rounded-lg p-4 flex items-center gap-3">
          <lucide-icon [img]="icons.AlertTriangle" [size]="18" class="text-red-500 flex-shrink-0"></lucide-icon>
          <span class="text-sm text-red-700">{{ error() }}</span>
        </div>
      }

      <form (ngSubmit)="login()">
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
          <div class="relative">
            <lucide-icon [img]="icons.Mail" [size]="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 z-10"></lucide-icon>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="admin@example.com"
              class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-lg placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            />
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
          <div class="relative">
            <lucide-icon [img]="icons.Lock" [size]="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 z-10"></lucide-icon>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter your password"
              class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-lg placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors disabled:bg-indigo-400 disabled:cursor-not-allowed"
        >
          {{ loading() ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </div>
  </div>
</div>
